name: Rollback Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Confirm rollback of the latest unreverted production release
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  statuses: read

concurrency:
  group: production-rollback
  cancel-in-progress: false

jobs:
  rollback:
    name: Revert previous production release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Require explicit confirmation
        if: ${{ !inputs.confirm }}
        run: exit 1

      - name: Check out protected main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          ssh-key: ${{ secrets.BOOKFLOW_RECOVERY_DEPLOY_KEY }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Select previous first-parent release
        id: target
        run: |
          echo "starting_sha=$(git rev-parse origin/main)" >> "$GITHUB_OUTPUT"
          node scripts/select-rollback-target.mjs origin/main

      - name: Revert selected release
        shell: bash
        env:
          TARGET_SHA: ${{ steps.target.outputs.target_sha }}
        run: |
          set -euo pipefail
          parent_count="$(git show -s --format=%P "$TARGET_SHA" | wc -w)"
          if [[ "$parent_count" -eq 0 ]]; then
            echo "Cannot revert the root commit." >&2
            exit 1
          elif [[ "$parent_count" -gt 1 ]]; then
            git revert -m 1 --no-commit "$TARGET_SHA"
          else
            git revert --no-commit "$TARGET_SHA"
          fi

          git restore --source=HEAD --staged --worktree -- \
            .github/workflows/rollback-production.yml \
            .github/workflows/protect-rollback-workflow.yml \
            .github/CODEOWNERS

          if git diff --cached --quiet; then
            echo "The selected release produced no revert changes." >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Validate reverted release
        run: npm run check:all

      - name: Confirm main has not moved
        shell: bash
        env:
          STARTING_SHA: ${{ steps.target.outputs.starting_sha }}
        run: |
          set -euo pipefail
          git fetch origin main
          latest_sha="$(git rev-parse origin/main)"
          if [[ "$latest_sha" != "$STARTING_SHA" ]]; then
            echo "main changed during rollback validation; refusing to push." >&2
            exit 1
          fi

      - name: Commit and push rollback
        id: push
        shell: bash
        env:
          TARGET_SHA: ${{ steps.target.outputs.target_sha }}
          TARGET_SHORT: ${{ steps.target.outputs.target_short }}
          TARGET_SUBJECT: ${{ steps.target.outputs.target_subject }}
        run: |
          set -euo pipefail
          git config user.name "BookFlow Rollback"
          git config user.email "actions@users.noreply.github.com"
          git commit \
            -m "Rollback $TARGET_SHORT: $TARGET_SUBJECT" \
            -m "Rollback-Target: $TARGET_SHA" \
            -m "Rollback-Ignore: true"

          rollback_sha="$(git rev-parse HEAD)"
          git push origin HEAD:main
          echo "rollback_sha=$rollback_sha" >> "$GITHUB_OUTPUT"

          {
            echo "## Rollback pushed"
            echo ""
            echo "- Rollback commit: \`$rollback_sha\`"
            echo "- Reverted release: \`$TARGET_SHA\`"
            echo "- Supabase data and migrations were not changed."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Wait for Vercel deployment
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ROLLBACK_SHA: ${{ steps.push.outputs.rollback_sha }}
        run: |
          set -euo pipefail
          api_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/commits/${ROLLBACK_SHA}/status"

          for attempt in {1..60}; do
            response="$(curl --fail --silent --show-error \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$api_url")"

            deployment_state="$(jq -r '
              [.statuses[] | select(.context | ascii_downcase | contains("vercel"))][0].state // "missing"
            ' <<< "$response")"
            deployment_url="$(jq -r '
              [.statuses[] | select(.context | ascii_downcase | contains("vercel"))][0].target_url // ""
            ' <<< "$response")"

            if [[ "$deployment_state" == "success" ]]; then
              {
                echo ""
                echo "## Rollback deployment"
                echo ""
                echo "- Vercel deployment succeeded."
                if [[ -n "$deployment_url" ]]; then
                  echo "- [View deployment]($deployment_url)"
                fi
              } >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi

            if [[ "$deployment_state" == "failure" || "$deployment_state" == "error" ]]; then
              echo "Vercel rollback deployment failed: $deployment_url" >&2
              exit 1
            fi
            sleep 5
          done

          echo "Timed out waiting for Vercel rollback deployment." >&2
          exit 1
