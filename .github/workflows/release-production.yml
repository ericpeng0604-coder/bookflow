name: Release Production

on:
  workflow_dispatch:
    inputs:
      release_sha:
        description: Full 40-character SHA of the current origin/main commit
        required: true
        type: string

permissions:
  contents: read
  checks: read

concurrency:
  group: release-production
  cancel-in-progress: false

jobs:
  validate:
    name: Validate exact main source
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      migrations: ${{ steps.source.outputs.migrations }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_sha }}
          fetch-depth: 0
      - id: source
        shell: bash
        env:
          RELEASE_SHA: ${{ inputs.release_sha }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "release_sha must be a full 40-character commit SHA." >&2
            exit 1
          fi
          git fetch origin main --force
          current_main="$(git rev-parse origin/main)"
          checked_out="$(git rev-parse HEAD)"
          test "$checked_out" = "$RELEASE_SHA"
          test "$current_main" = "$RELEASE_SHA"
          parent="$(git rev-parse "$RELEASE_SHA^1")"
          if git diff --name-only "$parent" "$RELEASE_SHA" | grep -Eq '^supabase/migrations/.*\.sql$'; then
            migrations=true
          else
            migrations=false
          fi
          echo "migrations=$migrations" >> "$GITHUB_OUTPUT"
          {
            echo "## Release source"
            echo ""
            echo "- Exact SHA: \`$RELEASE_SHA\`"
            echo "- origin/main: \`$current_main\`"
            echo "- Database migrations: \`$migrations\`"
          } >> "$GITHUB_STEP_SUMMARY"

  quality:
    name: Quality and build
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check:all

  handoff:
    name: Handoff and memory contract
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/ai-collaboration.mjs check
      - run: node scripts/check-memory.mjs

  staging:
    name: Staging migration and probes
    needs: validate
    if: ${{ needs.validate.outputs.migrations == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: supabase/setup-cli@v2
        with:
          version: 2.84.2
      - run: npm ci
      - name: Apply exact release migrations to staging
        env:
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: supabase db push --db-url "$STAGING_DATABASE_URL" --include-all
      - name: Verify staging migration history
        env:
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: supabase migration list --db-url "$STAGING_DATABASE_URL"
      - name: Verify staging RPC and RLS behavior
        env:
          STAGING_SUPABASE_URL: ${{ vars.STAGING_SUPABASE_URL }}
          STAGING_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          STAGING_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run staging:check

  production-migration:
    name: Production migration approval
    needs: [validate, staging]
    if: ${{ needs.validate.outputs.migrations == 'true' && needs.staging.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production-database
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_sha }}
          fetch-depth: 0
      - uses: supabase/setup-cli@v2
        with:
          version: 2.84.2
      - name: Apply exact release migrations to production
        env:
          PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: supabase db push --db-url "$PRODUCTION_DATABASE_URL" --include-all
      - name: Record production migration history
        env:
          PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: supabase migration list --db-url "$PRODUCTION_DATABASE_URL"

  deploy:
    name: Targeted Vercel production deployment
    needs: [validate, quality, handoff, staging, production-migration]
    if: >-
      ${{
        always() &&
        needs.validate.result == 'success' &&
        needs.quality.result == 'success' &&
        needs.handoff.result == 'success' &&
        (needs.staging.result == 'success' || needs.staging.result == 'skipped') &&
        (needs.production-migration.result == 'success' || needs.production-migration.result == 'skipped')
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      deployment_url: ${{ steps.create.outputs.deployment_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - id: create
        name: Create Vercel Git-targeted deployment
        shell: bash
        env:
          RELEASE_SHA: ${{ inputs.release_sha }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_GIT_REPO_ID: ${{ secrets.VERCEL_GIT_REPO_ID }}
        run: |
          set -euo pipefail
          for required in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID VERCEL_GIT_REPO_ID; do
            if [[ -z "${!required}" ]]; then
              echo "$required is required for the targeted Vercel deployment." >&2
              exit 1
            fi
          done
          payload="$(jq -n \
            --arg name "$GITHUB_REPOSITORY" \
            --arg project "$VERCEL_PROJECT_ID" \
            --arg sha "$RELEASE_SHA" \
            --arg ref "main" \
            --arg repo_id "$VERCEL_GIT_REPO_ID" \
            '{name:$name, project:$project, target:"production", gitSource:{type:"github", repoId:($repo_id|tonumber), ref:$ref, sha:$sha}}')"
          http_code="$(curl --silent --show-error --output deployment.json --write-out '%{http_code}' \
            --request POST "https://api.vercel.com/v13/deployments?teamId=$VERCEL_ORG_ID" \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            --header 'Content-Type: application/json' \
            --data "$payload")"
          if [[ "$http_code" -lt 200 || "$http_code" -ge 300 ]]; then
            cat deployment.json >&2
            exit 1
          fi
          deployment_id="$(jq -r '.id // empty' deployment.json)"
          deployment_host="$(jq -r '.url // empty' deployment.json)"
          test -n "$deployment_id"
          test -n "$deployment_host"
          deployment_url="https://$deployment_host"
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "deployment_id=$deployment_id" >> "$GITHUB_OUTPUT"
          for attempt in {1..60}; do
            state="$(curl --fail --silent --show-error \
              --header "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v13/deployments/$deployment_id?teamId=$VERCEL_ORG_ID" | jq -r '.readyState // "UNKNOWN"')"
            echo "Vercel deployment state: $state"
            if [[ "$state" == "READY" ]]; then break; fi
            if [[ "$state" == "ERROR" || "$state" == "CANCELED" ]]; then exit 1; fi
            if [[ "$attempt" == "60" ]]; then echo "Timed out waiting for Vercel deployment." >&2; exit 1; fi
            sleep 10
          done
          {
            echo "## Vercel deployment"
            echo ""
            echo "- URL: $deployment_url"
            echo "- Commit: \`$RELEASE_SHA\`"
            echo "- Status: READY"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Verify production release health and smoke
        env:
          RELEASE_BASE_URL: https://bookflow-green.vercel.app
          EXPECTED_COMMIT: ${{ inputs.release_sha }}
        run: node scripts/release-smoke.mjs
      - name: Add successful release evidence
        if: ${{ success() }}
        env:
          RELEASE_SHA: ${{ inputs.release_sha }}
        run: |
          {
            echo ""
            echo "## Production verification"
            echo ""
            echo "- Commit: \`$RELEASE_SHA\`"
            echo "- Release health and smoke passed."
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Add failure and rollback entry point
        if: ${{ failure() }}
        run: |
          {
            echo ""
            echo "## Production verification failed"
            echo ""
            echo "Result: NOT VERIFIED"
            echo "Use the **Rollback Production** workflow after confirming the failure."
          } >> "$GITHUB_STEP_SUMMARY"

  result:
    name: Release result
    needs: [validate, quality, handoff, staging, production-migration, deploy]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Require release completion
        env:
          VALIDATE: ${{ needs.validate.result }}
          QUALITY: ${{ needs.quality.result }}
          HANDOFF: ${{ needs.handoff.result }}
          STAGING: ${{ needs.staging.result }}
          PRODUCTION_MIGRATION: ${{ needs.production-migration.result }}
          DEPLOY: ${{ needs.deploy.result }}
        run: |
          set -euo pipefail
          echo "validate=$VALIDATE quality=$QUALITY handoff=$HANDOFF staging=$STAGING production-migration=$PRODUCTION_MIGRATION deploy=$DEPLOY"
          test "$VALIDATE" = success
          test "$QUALITY" = success
          test "$HANDOFF" = success
          test "$STAGING" = success -o "$STAGING" = skipped
          test "$PRODUCTION_MIGRATION" = success -o "$PRODUCTION_MIGRATION" = skipped
          test "$DEPLOY" = success
