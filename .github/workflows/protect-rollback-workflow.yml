name: Protect Recovery Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/rollback-production.yml"
      - ".github/workflows/protect-rollback-workflow.yml"
      - ".github/CODEOWNERS"

permissions:
  contents: read

concurrency:
  group: protect-production-recovery
  cancel-in-progress: false

jobs:
  protect:
    name: Restore unauthorized recovery changes
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out protected main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          ssh-key: ${{ secrets.BOOKFLOW_RECOVERY_DEPLOY_KEY }}

      - name: Check recovery approval trailer
        id: approval
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
          PUSHED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          messages="$(git log --format=%B "$BEFORE_SHA..$PUSHED_SHA")"
          if grep -qx 'Rollback-Workflow-Approved: true' <<< "$messages"; then
            echo "authorized=true" >> "$GITHUB_OUTPUT"
            echo "Authorized recovery infrastructure change." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "authorized=false" >> "$GITHUB_OUTPUT"
            echo "Missing recovery approval trailer; restoring protected files." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Restore protected recovery files
        if: ${{ steps.approval.outputs.authorized != 'true' }}
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
          PUSHED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [[ "$BEFORE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            echo "Cannot restore protected files without a previous main commit." >&2
            exit 1
          fi

          git fetch origin main
          current_sha="$(git rev-parse origin/main)"
          if [[ "$current_sha" != "$PUSHED_SHA" ]]; then
            echo "main moved after this workflow started; refusing to overwrite it." >&2
            exit 1
          fi

          protected_files=(
            ".github/workflows/rollback-production.yml"
            ".github/workflows/protect-rollback-workflow.yml"
            ".github/CODEOWNERS"
          )
          git checkout "$BEFORE_SHA" -- "${protected_files[@]}"
          if git diff --cached --quiet; then
            echo "No protected recovery file needs restoration." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          git config user.name "BookFlow Recovery Guard"
          git config user.email "actions@users.noreply.github.com"
          git commit \
            -m "Restore protected recovery files" \
            -m "Rollback-Workflow-Approved: true" \
            -m "Rollback-Ignore: true"
          git push origin HEAD:main

          {
            echo ""
            echo "## Recovery files restored"
            echo ""
            echo "Unauthorized changes to protected recovery files were reverted."
          } >> "$GITHUB_STEP_SUMMARY"
